<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #2c3e50;
            --cell-bg: #ecf0f1;
            --accent: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; text-align: center; }
        
        /* Stats Table */
        .stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .money { font-size: 20px; font-weight: bold; color: #2ecc71; }

        /* Board Layout (4x4 Loop) */
        .board-container { display: grid; grid-template-areas: 
            "c0 c1 c2 c3"
            "c11 . . c4"
            "c10 . . c5"
            "c9 c8 c7 c6";
            grid-template-columns: repeat(4, 1fr);
            gap: 5px; width: 100%; max-width: 350px; margin: 0 auto;
        }

        .cell { background: var(--cell-bg); color: #333; height: 80px; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; position: relative; border: 3px solid transparent; }
        .cell i { font-size: 10px; color: #7f8c8d; }
        .cell.active { border-color: #f1c40f; transform: scale(1.05); box-shadow: 0 0 15px #f1c40f; z-index: 10; }
        .owned { background: #bdc3c7; }
        .owner-tag { position: absolute; bottom: 2px; font-size: 9px; color: white; background: #2980b9; padding: 2px 4px; border-radius: 3px; }

        /* Controls */
        .controls { margin-top: 20px; }
        button { padding: 15px 40px; font-size: 18px; border-radius: 30px; border: none; background: #3498db; color: white; box-shadow: 0 4px #2980b9; cursor: pointer; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #2980b9; }
        
        .log { margin-top: 15px; font-size: 13px; color: #bdc3c7; min-height: 20px; }
    </style>
</head>
<body>

    <div class="stats">
        <div>Player: <span id="p-name">Loading...</span></div>
        <div class="money">💰 $<span id="balance">1500</span></div>
    </div>

    <div class="board-container" id="board">
        </div>

    <div class="log" id="game-log">ဂိမ်းစတင်ရန် အံစာတုံးခေါက်ပါ</div>

    <div class="controls">
        <button onclick="playTurn()">Roll Dice 🎲</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('p-name').innerText = tg.initDataUnsafe.user?.first_name || "Player 1";

        let balance = 1500;
        let currentPos = 0;
        const boardSize = 12;

        const cellsData = [
            { name: "GO", price: 0, rent: 0, color: "#2ecc71" },
            { name: "ရန်ကုန်", price: 200, rent: 50, color: "#e74c3c" },
            { name: "မန္တလေး", price: 180, rent: 40, color: "#e74c3c" },
            { name: "Chance", price: 0, rent: 0, color: "#f1c40f" },
            { name: "တောင်ကြီး", price: 150, rent: 30, color: "#3498db" },
            { name: "ပုဂံ", price: 160, rent: 35, color: "#3498db" },
            { name: "Jail", price: 0, rent: 0, color: "#95a5a6" },
            { name: "မကွေး", price: 120, rent: 20, color: "#f39c12" },
            { name: "ပဲခူး", price: 140, rent: 25, color: "#f39c12" },
            { name: "Electric", price: 150, rent: 50, color: "#7f8c8d" },
            { name: "မော်လမြိုင်", price: 130, rent: 22, color: "#9b59b6" },
            { name: "မြစ်ကြီးနား", price: 170, rent: 38, color: "#9b59b6" }
        ];

        let ownedProperties = {}; // { cellIndex: true }

        function createBoard() {
            const board = document.getElementById('board');
            for (let i = 0; i < boardSize; i++) {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell';
                cellDiv.style.gridArea = 'c' + i;
                cellDiv.id = 'cell-' + i;
                
                let header = document.createElement('div');
                header.style.width = '100%';
                header.style.height = '15px';
                header.style.background = cellsData[i].color;
                header.style.borderRadius = '3px 3px 0 0';
                
                cellDiv.innerHTML = `<i>${cellsData[i].price > 0 ? '$'+cellsData[i].price : ''}</i>
                                    <div>${cellsData[i].name}</div>`;
                cellDiv.prepend(header);
                board.appendChild(cellDiv);
            }
            updateUI();
        }

        function playTurn() {
            const dice = Math.floor(Math.random() * 6) + 1;
            let oldPos = currentPos;
            currentPos = (currentPos + dice);

            // Go အကွက်ကျော်ရင် ပိုက်ဆံပေးမယ်
            if (currentPos >= boardSize) {
                currentPos = currentPos % boardSize;
                balance += 200;
                log("GO ကို ဖြတ်လို့ $200 ရပါတယ်!");
            }

            updateUI();
            handleLanding(currentPos);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function handleLanding(pos) {
            const cell = cellsData[pos];
            if (cell.price > 0 && !ownedProperties[pos]) {
                if (balance >= cell.price) {
                    if (confirm(`${cell.name} ကို $${cell.price} နဲ့ ဝယ်မလား?`)) {
                        balance -= cell.price;
                        ownedProperties[pos] = true;
                        log(`${cell.name} ကို ဝယ်လိုက်ပါပြီ!`);
                    }
                } else {
                    log("ပိုက်ဆံမလောက်လို့ ဝယ်လို့မရပါ");
                }
            } else if (ownedProperties[pos]) {
                log(`${cell.name} က ကိုယ့်အပိုင်ဖြစ်ပါတယ်`);
            }
            updateUI();
        }

        function log(msg) {
            document.getElementById('game-log').innerText = msg;
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            document.getElementById('cell-' + currentPos).classList.add('active');
            
            for (let pos in ownedProperties) {
                const cell = document.getElementById('cell-' + pos);
                cell.classList.add('owned');
                if (!cell.querySelector('.owner-tag')) {
                    cell.innerHTML += `<div class="owner-tag">OWNED</div>`;
                }
            }
        }

        createBoard();
    </script>
</body>
</html>
