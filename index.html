<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Checkers</title>
    <style>
        body { font-family: sans-serif; background: #34495e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; }
        h2 { margin-bottom: 10px; }
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            width: 320px; height: 320px;
            border: 5px solid #2c3e50;
        }
        .square {
            width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .black { background-color: #7f8c8d; }
        .white { background-color: #ecf0f1; }
        .piece {
            width: 60px; height: 60px;
            border-radius: 50%;
            transition: 0.3s;
        }
        .player-piece { background-color: #e74c3c; box-shadow: 0 4px #c0392b; }
        .bot-piece { background-color: #2ecc71; box-shadow: 0 4px #27ae60; }
        .selected { border: 4px solid #f1c40f; }
        #status { margin-top: 20px; font-size: 1.2rem; }
        button { margin-top: 15px; padding: 10px 20px; background: #e67e22; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>ကျားကွက် (၄x၄ အသေးစား)</h2>
    <div id="board" class="board"></div>
    <div id="status">မင်းအလှည့် (အနီ)</div>
    <button onclick="resetGame()">ဂိမ်းပြန်စမည်</button>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        let boardState = [
            ['bot', '', 'bot', ''],
            ['', '', '', ''],
            ['', '', '', ''],
            ['', 'player', '', 'player']
        ];
        let selected = null;

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                    square.onclick = () => handleSquareClick(r, c);
                    
                    if (boardState[r][c] === 'player') {
                        const piece = document.createElement('div');
                        piece.className = 'piece player-piece';
                        if (selected && selected.r === r && selected.c === c) piece.classList.add('selected');
                        square.appendChild(piece);
                    } else if (boardState[r][c] === 'bot') {
                        const piece = document.createElement('div');
                        piece.className = 'piece bot-piece';
                        square.appendChild(piece);
                    }
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            if (boardState[r][c] === 'player') {
                selected = { r, c };
                createBoard();
            } else if (selected && boardState[r][c] === '') {
                // အခြေခံ ရွှေ့ကွက် (အပေါ်တစ်ကွက် တက်ခြင်း)
                if (Math.abs(selected.c - c) <= 1 && selected.r - r === 1) {
                    boardState[selected.r][selected.c] = '';
                    boardState[r][c] = 'player';
                    selected = null;
                    createBoard();
                    statusElement.innerText = "စက်အလှည့်...";
                    setTimeout(botMove, 1000);
                }
            }
        }

        function botMove() {
            // စက်က အရိုးရှင်းဆုံး ရွှေ့မယ့် Logic
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 4; c++) {
                    if (boardState[r][c] === 'bot' && boardState[r+1][c] === '') {
                        boardState[r][c] = '';
                        boardState[r+1][c] = 'bot';
                        createBoard();
                        statusElement.innerText = "မင်းအလှည့် (အနီ)";
                        return;
                    }
                }
            }
        }

        function resetGame() {
            boardState = [['bot', '', 'bot', ''], ['', '', '', ''], ['', '', '', ''], ['', 'player', '', 'player']];
            createBoard();
            statusElement.innerText = "မင်းအလှည့် (အနီ)";
        }

        createBoard();
    </script>
</body>
</html>
