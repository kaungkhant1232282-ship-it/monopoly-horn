<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly TG Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --button-color: var(--tg-theme-button-color, #3390ec);
        }
        body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        #board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 90vw; max-width: 400px; margin: 20px 0; }
        .cell { aspect-ratio: 1; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; border-radius: 8px; }
        .active { background: #ffd700; border-color: #ffa500; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: var(--button-color); color: white; border: none; border-radius: 12px; width: 80%; }
    </style>
</head>
<body>
    <h2>Monopoly Game</h2>
    <div id="board"></div>
    <button onclick="rollDice()">Dice Roll 🎲</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const boardSize = 12; // အကွက် ၁၂ ကွက်နဲ့ စမ်းမယ်
        let currentPos = 0;

        function initBoard() {
            const board = document.getElementById('board');
            for (let i = 0; i < boardSize; i++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.id = `cell-${i}`;
                div.innerText = i === 0 ? "GO" : i;
                board.appendChild(div);
            }
            updatePosition();
        }

        function updatePosition() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            document.getElementById(`cell-${currentPos}`).classList.add('active');
        }

        function rollDice() {
            const die = Math.floor(Math.random() * 6) + 1;
            currentPos = (currentPos + die) % boardSize;
            updatePosition();
            
            // Telegram တုန်ခါမှုပေးမယ်
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        initBoard();
    </script>
</body>
</html>
